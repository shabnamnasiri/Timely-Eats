<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | OrderFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/Add_menu.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 80px auto;
            padding: 0 20px;
            width: 100%;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--mist);
            text-decoration: none;
            margin-bottom: 24px;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: var(--accent);
        }
        .instruction-box {
            background: var(--cream);
            padding: 16px;
            border-left: 3px solid var(--accent);
            margin-bottom: 24px;
        }
        .instruction-box p {
            margin-bottom: 0 !important;
            font-size: 12px;
            color: var(--smoke);
        }
    </style>
</head>
<body style="display: block; background: var(--paper);">

    <div class="auth-container">
        <a href="login.html" class="back-link">
            <span>←</span> Back to Login
        </a>

        <div class="form-panel">
            <h2>Reset Password</h2>
            <p>Enter the email address associated with your account and we'll send you a link to reset your password.</p>
            <div class="form-divider"></div>

            <div class="instruction-box">
                <p><strong>Note:</strong> Password reset links are valid for 20 minutes.</p>
            </div>

            <form>
                <div class="field">
                    <label>Email Address</label>
                    <input type="email" placeholder="name@company.com" required>
                </div>

                <button type="submit" class="btn-submit" style="margin-top: 10px;">
                    Send Reset Link
                </button>
            </form>

            </div>

        <div style="text-align: center; margin-top: 30px;">
            <small style="font-family: 'DM Mono'; color: var(--ash); font-size: 9px; text-transform: uppercase; letter-spacing: 0.15em;">
                Having trouble? <a href="#" style="color: var(--mist); text-decoration: underline;">Contact IT Support</a>
            </small>
        </div>
    </div>

</body>
</html>
