<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Timely Eats — Sign In</title>
    <link rel="stylesheet" href="../static/css/Sign_in.css">

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>

<div class="layout">

  <!-- LEFT -->
  <aside class="panel-left">
    <div class="logo-block">
      <div class="logo-wordmark">Timely<span>Eats</span></div>
      <div class="logo-sub">Restaurant Management System</div>
    </div>

    <div class="panel-left-body">
      <h1 class="panel-headline">Run Every<span>Service.</span></h1>
      <p class="panel-desc">
        One unified platform for tables, orders, staff, and kitchen — built for operators who move at the speed of service.
      </p>
    </div>

    <div class="stats-row">
     
    </div>
  </aside>

  <!-- RIGHT -->
  <main class="panel-right">
    <div class="form-shell">
      <h2 class="form-title">Sign In</h2>
      <div class="divider"></div>

      <form action="/signin" method="post">
        <div class="field">
          <label for="username_phone">Username or Phone number</label>
          <input type="text" id="username_phone" name="username_phone" placeholder="you" required autocomplete="username_phone"/>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password"/>
        </div>

        <div class="options-row">
          <label class="checkbox-label">
            <input type="checkbox" name="remember"/>
            Keep me signed in
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary">Sign In to Dashboard</button>
      </form>

      <p class="bottom-link">
        No account yet? <a href="signup">Create one here →</a>
      </p>
    </div>

    <div class="copyright">© 2026 Timely Eats</div>
  </main>

</div>

</body>
</html>
