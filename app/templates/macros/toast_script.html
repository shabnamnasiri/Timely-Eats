{% macro render_toast_script() %}
<script>
  // ── Flash toasts ───────────────────────────────────────────────────────────
  window.addEventListener("load", function () {
    const toasts = document.querySelectorAll(".popup-toast");
    toasts.forEach((toast) => {
      setTimeout(() => {
        toast.style.opacity = "0";
        toast.style.transform = "translateY(-10px)";
        toast.style.transition = "all 0.4s ease";
        setTimeout(() => { toast.remove(); }, 400);
      }, 3000);
    });
  });

  // ── Sound ──────────────────────────────────────────────────────────────────
  let audioCtx = null;
  document.addEventListener("click", function () {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  });

  function playSound() {
    if (!audioCtx) return;
    try {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.6);
    } catch(e) {}
  }

  // ── Order toast ────────────────────────────────────────────────────────────
  window.showOrderToast = function(message, category, items) {
    const icons  = { success: "✅", warning: "⏳", info: "👨‍🍳", error: "❌" };
    const titles = { success: "Order Ready", warning: "Order Received", info: "Being Prepared", error: "Error" };

    const itemsHtml = items
      ? `<div class="order-toast-items">${items}</div>`
      : "";

    const toast = document.createElement("div");
    toast.className = `order-toast ${category}`;
    toast.innerHTML = `
      <span class="order-toast-icon">${icons[category] || "🔔"}</span>
      <div>
        <div class="order-toast-title">${titles[category] || "Notification"}</div>
        <div class="order-toast-msg">${message}</div>
        ${itemsHtml}
      </div>
      <button class="order-toast-close" onclick="this.parentElement.remove()">✕</button>
    `;
    document.body.appendChild(toast);
    void toast.offsetWidth;

    const timeout = category === "success" ? 6000 : 4000;
    setTimeout(() => {
      toast.style.opacity = "0";
      toast.style.transform = "translateY(16px)";
      toast.style.transition = "all 0.4s ease";
      setTimeout(() => toast.remove(), 400);
    }, timeout);
  };

// ── Socket: real-time order status notifications ───────────────────────────
  if (typeof io !== "undefined" && !window._orderSocketInit) {
    window._orderSocketInit = true;

    const _socket = io();

    _socket.on("connect", () => {
      console.log("[SOCKET] connected:", _socket.id);
    });

    _socket.on("order_update", (data) => {
      console.log("[SOCKET] order_update:", data);

      const status = data.status;

      const messages = {
        pending:   "Your order has been received! ⏳",
        preparing: "Your order is being prepared! 👨‍🍳",
        ready:     "Your order is ready! Enjoy your meal 🍽️",
        closed:    "Your order is ready! Enjoy your meal 🍽️",
      };

      const categories = {
        pending:   "warning",
        preparing: "info",
        ready:     "success",
        closed:    "success",
      };

      window.showOrderToast(
        messages[status] || "Order status updated.",
        categories[status] || "info",
        null
      );

      if (status === "ready" || status === "closed") playSound();

      // Reload on any status change so page reflects new state
      setTimeout(() => location.reload(), 2000);
    });
  }
  </script>
{% endmacro %}
