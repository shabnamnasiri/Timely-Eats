<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scan QR Code</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: #f5f5f0;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card { text-align: center; padding: 3rem 2rem; max-width: 420px; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; margin: 0 0 0.5rem; color: #c9a96e; }
    p { color: #999; margin: 0 0 2rem; }
    .btn { display: inline-block; padding: 0.8rem 2rem; background: #c9a96e; color: #0a0a0a; text-decoration: none; font-weight: 500; border-radius: 4px; }
    .links { margin-top: 1.5rem; display: flex; justify-content: center; gap: 1.5rem; }
    .links a { color: #666; text-decoration: none; font-size: 0.8rem; letter-spacing: 0.05em; transition: color 0.2s; }
    .links a:hover { color: #c9a96e; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📱</div>
    <h1>Scan QR Code</h1>
    <p>Please scan the QR code on your table to continue ordering.</p>
    <a href="/logout" class="btn">Logout</a>
    <div class="links">
      <a href="/customer/profile">My Profile</a>
      <a href="/customer/order_history">Past Orders</a>
    </div>
  </div>
</body>
</html>
